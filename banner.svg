<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="CKHAI-ASSISTANT banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b1f"/>
      <stop offset="50%" stop-color="#120a2e"/>
      <stop offset="100%" stop-color="#08060f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3b0d8f"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- subtle moving grid -->
  <g stroke="#6d28d9" stroke-width="1" opacity="0.10">
    <g>
      <line x1="0" y1="60" x2="1200" y2="60"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="180" x2="1200" y2="180"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 60" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- pulsing glow behind cube -->
  <circle cx="980" cy="170" r="130" fill="url(#glow)">
    <animate attributeName="r" values="110;140;110" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- floating document cards (left) -->
  <g>
    <g transform="translate(120 110)">
      <rect x="-34" y="-44" width="68" height="88" rx="8" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="-22" y="-30" width="44" height="5" rx="2.5" fill="#a78bfa"/>
      <rect x="-22" y="-18" width="44" height="5" rx="2.5" fill="#6d28d9"/>
      <rect x="-22" y="-6" width="32" height="5" rx="2.5" fill="#6d28d9"/>
      <rect x="-22" y="14" width="44" height="5" rx="2.5" fill="#22d3ee"/>
      <animateTransform attributeName="transform" type="translate" values="120 110; 120 96; 120 110" dur="5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(190 200)" opacity="0.85">
      <rect x="-28" y="-36" width="56" height="72" rx="7" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5"/>
      <rect x="-18" y="-24" width="36" height="4" rx="2" fill="#22d3ee"/>
      <rect x="-18" y="-14" width="36" height="4" rx="2" fill="#6d28d9"/>
      <rect x="-18" y="-4" width="24" height="4" rx="2" fill="#6d28d9"/>
      <animateTransform attributeName="transform" type="translate" values="190 200; 190 212; 190 200" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- flowing data lines from docs to cube -->
  <g stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M170 110 C 400 120, 650 150, 920 170" stroke="#a78bfa" stroke-dasharray="6 14" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M230 200 C 450 200, 680 185, 920 175" stroke="#22d3ee" stroke-dasharray="6 14" opacity="0.7">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 3D isometric vector-store cube (right) -->
  <g transform="translate(980 170)">
    <g>
      <!-- left face -->
      <path d="M0 0 L-70 -40 L-70 50 L0 90 Z" fill="url(#cubeLeft)"/>
      <!-- right face -->
      <path d="M0 0 L70 -40 L70 50 L0 90 Z" fill="url(#cubeRight)"/>
      <!-- top face -->
      <path d="M0 0 L-70 -40 L0 -80 L70 -40 Z" fill="url(#cubeTop)"/>
      <!-- edge highlights -->
      <path d="M0 0 L0 90 M0 0 L-70 -40 M0 0 L70 -40" stroke="#e9d5ff" stroke-width="1.2" opacity="0.5"/>
      <!-- data nodes inside -->
      <circle cx="-30" cy="10" r="4" fill="#e9d5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="30" cy="-5" r="4" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="0" cy="40" r="4" fill="#e9d5ff"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- drifting particles -->
  <g fill="#22d3ee">
    <circle cx="500" cy="70" r="2.5"><animate attributeName="cy" values="70;40;70" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.9;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="280" r="2" fill="#a78bfa"><animate attributeName="cy" values="280;250;280" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0.2;0.9" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="90" r="2.5" fill="#818cf8"><animate attributeName="cy" values="90;120;90" dur="4.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;1;0.3" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="260" r="2"><animate attributeName="cy" values="260;235;260" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- 3D extruded title -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="58" text-anchor="middle">
    <text x="494" y="166" fill="#1e0a3c">CKHAI-ASSISTANT</text>
    <text x="492" y="164" fill="#2a0e52">CKHAI-ASSISTANT</text>
    <text x="490" y="162" fill="#3b0d8f">CKHAI-ASSISTANT</text>
    <text x="488" y="160" fill="#5b21b6">CKHAI-ASSISTANT</text>
    <text x="486" y="158" fill="url(#title)">CKHAI-ASSISTANT</text>
  </g>

  <!-- subtitle -->
  <text x="486" y="200" font-family="'Fira Code', monospace" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="3">
    RAG  ·  DOCUMENT  Q&amp;A  ·  AI
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- tech chips -->
  <g font-family="'Fira Code', monospace" font-size="13" fill="#cbd5e1" text-anchor="middle">
    <g transform="translate(360 240)"><rect x="-50" y="-15" width="100" height="30" rx="15" fill="#1e1b4b" stroke="#7c3aed"/><text y="5">FastAPI</text></g>
    <g transform="translate(486 240)"><rect x="-55" y="-15" width="110" height="30" rx="15" fill="#1e1b4b" stroke="#22d3ee"/><text y="5">LangChain</text></g>
    <g transform="translate(615 240)"><rect x="-52" y="-15" width="104" height="30" rx="15" fill="#1e1b4b" stroke="#7c3aed"/><text y="5">ChromaDB</text></g>
  </g>
</svg>
